services:
  wordpress:
    image: wordpress:php8.3-apache
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: geolander
      WORDPRESS_DB_PASSWORD: geolander_dev
      WORDPRESS_DB_NAME: geolander
      WORDPRESS_DEBUG: 1
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', 'http://localhost:8080');
        define('WP_SITEURL', 'http://localhost:8080');
        define('WP_ENVIRONMENT_TYPE', 'development');
    volumes:
      - wp_data:/var/www/html
      - ./wp-content/themes/geolander:/var/www/html/wp-content/themes/geolander
      - ./wp-content/plugins/geolander-core:/var/www/html/wp-content/plugins/geolander-core
      - ./_migration:/migration
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: geolander
      MARIADB_USER: geolander
      MARIADB_PASSWORD: geolander_dev
      MARIADB_ROOT_PASSWORD: root_dev
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  cli:
    image: wordpress:cli-php8.3
    user: "33:33"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: geolander
      WORDPRESS_DB_PASSWORD: geolander_dev
      WORDPRESS_DB_NAME: geolander
    volumes:
      - wp_data:/var/www/html
      - ./wp-content/themes/geolander:/var/www/html/wp-content/themes/geolander
      - ./wp-content/plugins/geolander-core:/var/www/html/wp-content/plugins/geolander-core
      - ./_migration:/migration
    depends_on:
      db:
        condition: service_healthy
    entrypoint: wp
    command: "--info"

volumes:
  wp_data:
  db_data:
